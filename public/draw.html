<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>抽签 - 抽签系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="common.css" />
  <style>
    input[type=number] { width: 4.5em; text-align: center; }
    .config-inline { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .config-inline .muted { margin: 0; }
    .round1-list { list-style: none; margin: 0; padding: 0; }
    .round1-list li {
      padding: 14px 18px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.06) 0%, rgba(147, 197, 253, 0.04) 100%);
      border: 1px solid rgba(59, 130, 246, 0.15);
      opacity: 0;
      transform: translateY(12px);
      animation: revealItem 0.55s ease-out forwards;
      box-shadow: 0 2px 8px rgba(30, 64, 125, 0.06);
    }
    .round1-list li:nth-child(1) { animation-delay: 0.1s; }
    .round1-list li:nth-child(2) { animation-delay: 0.35s; }
    .round1-list li:nth-child(3) { animation-delay: 0.6s; }
    .round1-list li:nth-child(4) { animation-delay: 0.85s; }
    .round1-list li:nth-child(5) { animation-delay: 1.1s; }
    .round1-list li:nth-child(6) { animation-delay: 1.35s; }
    .round1-list li:nth-child(7) { animation-delay: 1.6s; }
    .round1-list li:nth-child(8) { animation-delay: 1.85s; }
    .round1-list li:nth-child(9) { animation-delay: 2.1s; }
    .round1-list li:nth-child(10) { animation-delay: 2.35s; }
    .round1-list li:last-child { margin-bottom: 0; }
    .round1-list li:hover { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.25); }
    @keyframes revealItem {
      to { opacity: 1; transform: translateY(0); }
    }
    .final-wrap { margin-top: 32px; padding-top: 28px; border-top: 1px solid var(--border); }
    .final-placeholder {
      color: var(--muted);
      font-size: 1rem;
      padding: 28px;
      text-align: center;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.04) 0%, transparent 100%);
      border: 2px dashed rgba(59, 130, 246, 0.25);
      animation: pulseHint 2s ease-in-out infinite;
    }
    @keyframes pulseHint {
      0%, 100% { opacity: 0.85; border-color: rgba(59, 130, 246, 0.25); }
      50% { opacity: 1; border-color: rgba(59, 130, 246, 0.4); }
    }
    .final-result {
      background: linear-gradient(135deg, rgba(220, 38, 38, 0.12) 0%, rgba(239, 68, 68, 0.08) 100%);
      border: 2px solid rgba(220, 38, 38, 0.45);
      border-radius: 16px;
      padding: 28px 24px;
      font-weight: 700;
      font-size: 1.5rem;
      text-align: center;
      color: #b91c1c;
      box-shadow: 0 8px 32px rgba(220, 38, 38, 0.2);
    }
    .final-result.final-reveal {
      opacity: 0;
      transform: scale(0.92);
      animation: finalReveal 1.8s ease-out forwards;
    }
    @keyframes finalReveal {
      0% { opacity: 0; transform: scale(0.92); filter: blur(4px); }
      40% { opacity: 0.6; transform: scale(1.02); filter: blur(0); }
      100% { opacity: 1; transform: scale(1); filter: blur(0); }
    }
    .btn-reveal { font-size: 1.05rem; padding: 14px 28px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1 class="page-title">抽签</h1>
      <nav class="nav-links">
        <a href="index.html">首页</a>
        <a href="import.html">导入底库</a>
        <a href="history.html">历史记录</a>
      </nav>
    </header>

    <section class="section" id="configSection">
      <h2 class="section-title">抽签配置</h2>
      <div class="row config-inline">
        <label for="round1Count">第一轮名额</label>
        <input type="number" id="round1Count" min="5" max="10" value="7" />
        <span class="muted">5～10 家</span>
      </div>
      <div class="row">
        <button id="runDraw" class="btn-primary">执行第一轮抽签</button>
      </div>
      <p id="drawError" class="error"></p>
    </section>

    <section class="section" id="resultSection" style="display: none;">
      <h2 class="section-title">本次抽签结果</h2>
      <div>
        <p class="muted">第一轮入围</p>
        <ul id="round1List" class="round1-list"></ul>
      </div>
      <div id="finalBlock" class="final-wrap">
        <p class="muted">最终结果</p>
        <div id="finalPlaceholder" class="final-placeholder">即将从以上入围名单中抽取一家</div>
        <div id="finalResult" class="final-result" style="display: none;"></div>
        <div class="row">
          <button id="revealFinal" class="btn-primary btn-reveal">揭晓最终结果</button>
        </div>
      </div>
    </section>
  </div>
  <script src="draw.js"></script>
</body>
</html>
